<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>雪莉與朵栗 團購行事曆</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Baloo+2:wght@600;700;800&display=swap');

  * { box-sizing: border-box; min-width: 0; }
  html, body { width: 100%; overflow-x: hidden; }

  body {
    margin: 0;
    font-family: 'Noto Sans TC', sans-serif;
    background: linear-gradient(180deg, #FFF7EE 0%, #FFF1E6 100%);
    color: #5a4a3f;
    padding: 16px 8px 50px;
  }

  .wrap {
    max-width: 1080px;
    margin: 0 auto;
    background: #FFFBF5;
    border-radius: 22px;
    border: 3px solid #FFE3CC;
    padding: 18px 14px 26px;
    box-shadow: 0 10px 30px rgba(230, 160, 120, 0.15);
  }

  /* header */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .header-row2 {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }

  .month-num {
    font-family: 'Baloo 2', 'Noto Sans TC', sans-serif;
    font-weight: 800;
    font-size: 46px;
    color: #FF8FA3;
    line-height: 1;
    text-shadow: 2px 2px 0 #FFE0E8;
    flex: none;
  }

  .title-block {
    display: flex;
    flex-direction: column;
    gap: 0px;
  }

  .title-block .sub {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: 18px;
    color: #FF8FA3;
  }
  .title-block .main {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: 21px;
    color: #6b5a4f;
  }

  .title-img {
    height: 96px;
    width: auto;
    max-width: 100%;
    flex: 1 1 auto;
    object-fit: contain;
  }

  @media (max-width: 480px) {
    .title-img { height: 68px; }
  }

  .controls {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .controls select, .controls button {
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 700;
    font-size: 13px;
    border-radius: 999px;
    border: 2px solid #FFD3B6;
    background: #fff;
    color: #b5755a;
    padding: 7px 14px;
    cursor: pointer;
  }
  .controls button:hover { background: #FFF1E6; }

  .status {
    font-size: 11px;
    color: #b39a8b;
    margin-bottom: 10px;
  }
  .status.error { color: #e0654f; }

  /* weekday header */
  .weekdays {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    gap: 5px;
    margin-bottom: 6px;
  }
  .weekday {
    text-align: center;
    padding: 6px 0;
    border-radius: 999px;
    color: #fff;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 1px;
  }
  .wd-0 { background: #FF8FA3; }
  .wd-1 { background: #FFB37A; }
  .wd-2 { background: #9ACB85; }
  .wd-3 { background: #6FC8C2; }
  .wd-4 { background: #7AAEEB; }
  .wd-5 { background: #B79AE8; }
  .wd-6 { background: #FF8FA3; }

  /* month grid: stack of week rows */
  .month-grid {
    border-top: 2px solid #F3E2D3;
    border-left: 2px solid #F3E2D3;
    border-radius: 12px;
    overflow: hidden;
  }

  .week {
    display: grid;
    grid-template-columns: repeat(7, minmax(0, 1fr));
    border-bottom: 2px solid #F3E2D3;
  }

  .daycell {
    grid-row: 1 / -1;
    border-right: 2px solid #F3E2D3;
    background: #FFFDFA;
    padding: 5px 4px 4px;
    min-height: 30px;
  }
  .daycell.dim { background: #FBF6EF; }
  .daynum {
    font-weight: 700;
    font-size: 13px;
    color: #a89888;
  }
  .daycell.dim .daynum { color: #ddd0c2; }

  /* ===== 簡化後的活動橫條 =====
     左側色塊編號 + 中間標題(主) + 日期(次，灰色小字) + 右側標籤
     底色統一淺白，僅靠左側色條 + 編號圓圈辨色，降低視覺噪音 */
  .ebar {
    margin: 2px 2px;
    border-radius: 8px;
    padding: 0 6px 0 0;
    display: flex;
    align-items: center;
    gap: 6px;
    overflow: hidden;
    align-self: center;
    z-index: 2;
    background: #FFFFFF;
    border-left: 4px solid transparent;
    box-shadow: 0 1px 2px rgba(150,120,100,0.08);
  }
  .badge {
    flex: none;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    color: #fff;
    font-weight: 800;
    font-size: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-left: 4px;
  }
  .ev-text {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    line-height: 1.15;
  }
  .ev-title {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #4a3a30;
    font-weight: 700;
    font-size: 11px;
  }
  .ev-date {
    flex: none;
    font-weight: 500;
    color: #b5a89c;
    font-size: 9px;
  }
  .ev-tag {
    flex: none;
    color: #fff;
    font-weight: 800;
    font-size: 8.5px;
    border-radius: 999px;
    padding: 1px 6px;
    margin-left: auto;
  }

  /* 同色系深淺：左側border + 編號圓圈用深色，標籤用同色系，底色保持白 */
  .c0 { border-left-color: #FF8FA3; } .c0 .badge { background: #FF8FA3; } .c0 .ev-tag { background: #FF8FA3; }
  .c1 { border-left-color: #FFB37A; } .c1 .badge { background: #FFB37A; } .c1 .ev-tag { background: #FFB37A; }
  .c2 { border-left-color: #9ACB85; } .c2 .badge { background: #9ACB85; } .c2 .ev-tag { background: #9ACB85; }
  .c3 { border-left-color: #6FC8C2; } .c3 .badge { background: #6FC8C2; } .c3 .ev-tag { background: #6FC8C2; }
  .c4 { border-left-color: #7AAEEB; } .c4 .badge { background: #7AAEEB; } .c4 .ev-tag { background: #7AAEEB; }
  .c5 { border-left-color: #B79AE8; } .c5 .badge { background: #B79AE8; } .c5 .ev-tag { background: #B79AE8; }
  .c6 { border-left-color: #FF8FA3; } .c6 .badge { background: #FF8FA3; } .c6 .ev-tag { background: #FF8FA3; }

  .footer {
    text-align: center;
    margin-top: 18px;
    color: #FF8FA3;
    font-weight: 700;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    .month-num { font-size: 36px; }
    .title-block .main { font-size: 16px; }
    .title-block .sub { font-size: 14px; }
    .weekday { font-size: 10px; }
    .daynum { font-size: 11px; }
    .ebar { padding-right: 4px; }
    .badge { width: 14px; height: 14px; font-size: 8px; }
    .ev-title { font-size: 10px; }
    .ev-date { font-size: 8.5px; }
    .ev-tag { font-size: 8px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
  </div>

  <div class="header-row2">
    <div class="month-num" id="monthNum">7月</div>
    <img class="title-img" id="titleImg" alt="雪莉與朵栗 團購行事曆" src="">
    <div class="controls">
      <select id="monthSelect"></select>
      <button id="refreshBtn">重新整理</button>
    </div>
  </div>

  <div class="status" id="status">資料載入中…</div>

  <div class="weekdays">
    <div class="weekday wd-0">日</div>
    <div class="weekday wd-1">一</div>
    <div class="weekday wd-2">二</div>
    <div class="weekday wd-3">三</div>
    <div class="weekday wd-4">四</div>
    <div class="weekday wd-5">五</div>
    <div class="weekday wd-6">六</div>
  </div>

  <div class="month-grid" id="grid"></div>

  <div class="footer">IG @dondon0813 ♥</div>
</div>

<script>
const SHEET_ID = "18DfV9xz58VvNDuKx7LD2aUewwBeN3abugK9BAl79rJk";
const GVIZ_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;
const COLORS = 7;

let allEvents = [];
let currentYear, currentMonth;

function parseDateStr(s) {
  if (!s) return null;
  s = String(s).trim();
  const gvizMatch = s.match(/Date\((\d+),(\d+),(\d+)\)/);
  if (gvizMatch) {
    return new Date(parseInt(gvizMatch[1]), parseInt(gvizMatch[2]), parseInt(gvizMatch[3]));
  }
  const parts = s.split(/[\/\-]/).map(p => parseInt(p, 10));
  if (parts.length === 3) return new Date(parts[0], parts[1] - 1, parts[2]);
  return null;
}

function fmtDateLabel(start, end) {
  const f = d => `${d.getMonth()+1}/${d.getDate()}`;
  return `${f(start)}–${f(end)}`;
}

function daysBetween(a, b) {
  const A = new Date(a.getFullYear(), a.getMonth(), a.getDate());
  const B = new Date(b.getFullYear(), b.getMonth(), b.getDate());
  return Math.round((B - A) / 86400000);
}

async function loadData() {
  const statusEl = document.getElementById('status');
  statusEl.textContent = '資料載入中…';
  statusEl.classList.remove('error');
  try {
    const res = await fetch(GVIZ_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('網路錯誤 ' + res.status);
    const text = await res.text();
    const jsonStr = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
    const data = JSON.parse(jsonStr);
    const rows = data.table.rows;

    const events = [];
    rows.forEach((row) => {
      const c = row.c;
      if (!c || !c[0] || c[0].v === null || c[0].v === '') return;
      const id = c[0].v;
      const startRaw = c[1] ? c[1].v : null;
      const endRaw = c[2] ? c[2].v : null;
      const title = c[3] ? c[3].v : '';
      const tag = c[4] ? c[4].v : '';
      const start = parseDateStr(startRaw);
      const end = parseDateStr(endRaw);
      if (!start || !end || !title) return;
      events.push({ id, start, end, title, tag });
    });

    allEvents = events;
    statusEl.textContent = `已同步 ${events.length} 檔活動 · ${new Date().toLocaleString('zh-TW')}`;
    populateMonthSelect();
    render();
  } catch (err) {
    statusEl.textContent = '讀取試算表失敗，請確認試算表已設定「知道連結的人可檢視」。(' + err.message + ')';
    statusEl.classList.add('error');
  }
}

function populateMonthSelect() {
  const sel = document.getElementById('monthSelect');
  const monthsSet = new Set();
  allEvents.forEach(ev => {
    let d = new Date(ev.start.getFullYear(), ev.start.getMonth(), 1);
    const endD = new Date(ev.end.getFullYear(), ev.end.getMonth(), 1);
    while (d <= endD) {
      monthsSet.add(`${d.getFullYear()}-${d.getMonth()}`);
      d.setMonth(d.getMonth() + 1);
    }
  });
  let months = Array.from(monthsSet).map(s => {
    const [y, m] = s.split('-').map(Number);
    return { y, m };
  }).sort((a, b) => a.y - b.y || a.m - b.m);

  if (months.length === 0) {
    const now = new Date();
    months = [{ y: now.getFullYear(), m: now.getMonth() }];
  }

  sel.innerHTML = '';
  months.forEach(({ y, m }) => {
    const opt = document.createElement('option');
    opt.value = `${y}-${m}`;
    opt.textContent = `${y}年 ${m + 1}月`;
    sel.appendChild(opt);
  });

  if (currentYear === undefined) {
    currentYear = months[0].y;
    currentMonth = months[0].m;
  }
  sel.value = `${currentYear}-${currentMonth}`;
  sel.onchange = () => {
    const [y, m] = sel.value.split('-').map(Number);
    currentYear = y; currentMonth = m;
    render();
  };
}

function render() {
  if (currentYear === undefined) return;
  document.getElementById('monthNum').textContent = (currentMonth + 1) + '月';

  const grid = document.getElementById('grid');
  grid.innerHTML = '';

  const firstOfMonth = new Date(currentYear, currentMonth, 1);
  const startOffset = firstOfMonth.getDay();
  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const gridStart = new Date(currentYear, currentMonth, 1 - startOffset);
  const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
  const numWeeks = totalCells / 7;

  for (let w = 0; w < numWeeks; w++) {
    const weekStart = new Date(gridStart.getFullYear(), gridStart.getMonth(), gridStart.getDate() + w * 7);
    const weekDays = [];
    for (let i = 0; i < 7; i++) {
      weekDays.push(new Date(weekStart.getFullYear(), weekStart.getMonth(), weekStart.getDate() + i));
    }
    const weekEnd = weekDays[6];

    const weekEvents = allEvents
      .filter(ev => ev.end >= weekStart && ev.start <= weekEnd)
      .map(ev => {
        const colStart = Math.max(0, daysBetween(weekStart, ev.start));
        const colEnd = Math.min(6, daysBetween(weekStart, ev.end));
        return { ev, colStart, colEnd };
      })
      .sort((a, b) => a.colStart - b.colStart || (b.colEnd - b.colStart) - (a.colEnd - a.colStart));

    const laneEnd = [];
    weekEvents.forEach(item => {
      let lane = 0;
      while (lane < laneEnd.length && laneEnd[lane] >= item.colStart) lane++;
      laneEnd[lane] = item.colEnd;
      item.lane = lane;
    });
    const maxLanes = Math.max(1, laneEnd.length);

    const weekEl = document.createElement('div');
    weekEl.className = 'week';
    weekEl.style.gridTemplateRows = `22px repeat(${maxLanes}, 24px) 4px`;

    weekDays.forEach((d, i) => {
      const cell = document.createElement('div');
      const dim = d.getMonth() !== currentMonth;
      cell.className = 'daycell' + (dim ? ' dim' : '');
      cell.style.gridColumn = `${i + 1}`;
      const dn = document.createElement('div');
      dn.className = 'daynum';
      dn.textContent = d.getDate();
      cell.appendChild(dn);
      weekEl.appendChild(cell);
    });

    weekEvents.forEach(item => {
      const colorIdx = (item.ev.id - 1) % COLORS;
      const bar = document.createElement('div');
      bar.className = `ebar c${colorIdx}`;
      bar.style.gridColumn = `${item.colStart + 1} / ${item.colEnd + 2}`;
      bar.style.gridRow = `${item.lane + 2}`;
      bar.title = `${item.ev.title} (${fmtDateLabel(item.ev.start, item.ev.end)})`;

      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = item.ev.id;
      bar.appendChild(badge);

      const textWrap = document.createElement('span');
      textWrap.className = 'ev-text';

      const titleSpan = document.createElement('span');
      titleSpan.className = 'ev-title';
      titleSpan.textContent = item.ev.title;
      textWrap.appendChild(titleSpan);

      const dateSpan = document.createElement('span');
      dateSpan.className = 'ev-date';
      dateSpan.textContent = fmtDateLabel(item.ev.start, item.ev.end);
      textWrap.appendChild(dateSpan);

      bar.appendChild(textWrap);

      if (item.ev.tag) {
        const tagSpan = document.createElement('span');
        tagSpan.className = 'ev-tag';
        tagSpan.textContent = item.ev.tag;
        bar.appendChild(tagSpan);
      }

      weekEl.appendChild(bar);
    });

    grid.appendChild(weekEl);
  }
}

document.getElementById('refreshBtn').addEventListener('click', loadData);
loadData();
setInterval(loadData, 60000);
</script>

</body>
</html>
